<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LG Buying Guides - GA Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* =========== DARK THEME (default) =========== */
:root, [data-theme="dark"] {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #22222e;
  --border: #2a2a3a;
  --text: #e4e4ef;
  --text2: #8888a0;
  --accent: #6366f1;
  --accent2: #818cf8;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --orange: #f97316;
  --chart-grid: rgba(42,42,58,0.5);
  --chart-text: #8888a0;
  --hover-row: rgba(99,102,241,0.03);
}

/* =========== LIGHT THEME =========== */
[data-theme="light"] {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface2: #f0f0f3;
  --border: #e0e0e6;
  --text: #1a1a2e;
  --text2: #6b6b80;
  --accent: #4f46e5;
  --accent2: #6366f1;
  --green: #16a34a;
  --red: #dc2626;
  --yellow: #ca8a04;
  --orange: #ea580c;
  --chart-grid: rgba(0,0,0,0.06);
  --chart-text: #6b6b80;
  --hover-row: rgba(79,70,229,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  transition: background 0.25s, color 0.25s;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
  gap: 8px;
}

.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--accent2); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-actions .last-updated {
  font-size: 12px;
  color: var(--text2);
  margin-right: 4px;
}

/* Toggle pill buttons */
.toggle-group {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.toggle-group button {
  padding: 5px 12px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.toggle-group button.active {
  background: var(--accent);
  color: #fff;
}

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-outline {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}

.btn-outline:hover { border-color: var(--accent); color: var(--accent2); }
.btn-outline.active { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,0.1); }

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  transition: background 0.2s;
}

.kpi-card .kpi-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.kpi-card .kpi-value { font-size: 28px; font-weight: 700; }
.kpi-card .kpi-change { font-size: 12px; margin-top: 4px; }
.kpi-change.up { color: var(--green); }
.kpi-change.down { color: var(--red); }
.kpi-change.neutral { color: var(--text2); }

.section-title {
  font-size: 16px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.section-title .badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: rgba(99,102,241,0.15); color: var(--accent2);
}

.charts-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 16px; margin-bottom: 32px;
}

@media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; transition: background 0.2s;
}

.chart-card h3 { font-size: 14px; font-weight: 500; color: var(--text2); margin-bottom: 12px; }
.chart-card canvas { max-height: 280px; }

.insights-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 16px; margin-bottom: 32px;
}

.insight-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px; border-left: 3px solid;
}

.insight-card.warning { border-left-color: var(--yellow); }
.insight-card.success { border-left-color: var(--green); }
.insight-card.traffic { border-left-color: var(--accent); }
.insight-card.info { border-left-color: var(--text2); }

.insight-card .insight-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

.insight-card .priority-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  font-weight: 600; text-transform: uppercase;
}

.priority-badge.high { background: rgba(239,68,68,0.2); color: var(--red); }
.priority-badge.medium { background: rgba(234,179,8,0.2); color: var(--yellow); }

.insight-card .insight-page { font-size: 12px; font-weight: 600; color: var(--accent2); }
.insight-card .insight-text { font-size: 13px; color: var(--text); line-height: 1.6; }

.action-items {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 32px;
}

.action-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.action-item:last-child { border-bottom: none; }

.action-item .action-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; font-weight: 700;
}

.action-icon.urgent { background: rgba(239,68,68,0.15); color: var(--red); }
.action-icon.improve { background: rgba(234,179,8,0.15); color: var(--yellow); }
.action-icon.monitor { background: rgba(99,102,241,0.15); color: var(--accent2); }

.action-item .action-text { font-size: 13px; color: var(--text); }
.action-item .action-text strong { color: var(--accent2); }

.status-table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow-x: auto; margin-bottom: 32px;
}

.status-table { width: 100%; border-collapse: collapse; font-size: 13px; }

.status-table th {
  background: var(--surface2); padding: 10px 14px; text-align: left;
  font-weight: 500; color: var(--text2); border-bottom: 1px solid var(--border);
}

.status-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.status-table tr:last-child td { border-bottom: none; }
.status-table tr:hover { background: var(--hover-row); }

.status-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.status-badge.live { background: rgba(34,197,94,0.15); color: var(--green); }
.status-badge.pending { background: rgba(234,179,8,0.15); color: var(--yellow); }
.status-badge.none { background: rgba(136,136,160,0.1); color: var(--text2); }

.comparison-table { width: 100%; border-collapse: collapse; font-size: 13px; }

.comparison-table th {
  background: var(--surface2); padding: 10px 14px; text-align: right;
  font-weight: 500; color: var(--text2); border-bottom: 1px solid var(--border);
}

.comparison-table th:first-child { text-align: left; }

.comparison-table td {
  padding: 10px 14px; text-align: right;
  border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums;
}

.comparison-table td:first-child { text-align: left; font-weight: 500; }

.tabs {
  display: flex; gap: 4px; margin-bottom: 24px;
  background: var(--surface); border-radius: 10px; padding: 4px;
  width: fit-content; flex-wrap: wrap;
}

.tab {
  padding: 8px 16px; border-radius: 8px; border: none;
  background: transparent; color: var(--text2); font-size: 13px;
  cursor: pointer; transition: all 0.15s;
}

.tab.active { background: var(--accent); color: white; }
.tab:hover:not(.active) { color: var(--text); }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 20px; font-size: 13px;
  z-index: 200; opacity: 0; transform: translateY(10px); transition: all 0.3s;
}

.toast.show { opacity: 1; transform: translateY(0); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Expert Analysis Styles */
.exec-summary {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 24px;
  border-left: 4px solid var(--accent);
}
.exec-summary h3 { font-size: 16px; margin-bottom: 12px; color: var(--accent2); }
.exec-summary p { font-size: 14px; line-height: 1.8; color: var(--text); margin-bottom: 8px; }

.country-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 16px;
}
.country-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.country-card-header h3 { font-size: 16px; font-weight: 600; }
.status-pill {
  padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
  text-transform: uppercase;
}
.status-pill.growing { background: rgba(34,197,94,0.15); color: var(--green); }
.status-pill.stable { background: rgba(99,102,241,0.15); color: var(--accent2); }
.status-pill.declining { background: rgba(239,68,68,0.15); color: var(--red); }

.country-metrics {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px; margin-bottom: 16px;
}
.country-metric { text-align: center; }
.country-metric .cm-value { font-size: 20px; font-weight: 700; }
.country-metric .cm-label { font-size: 11px; color: var(--text2); }

.link-chips {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
}
.link-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 6px; font-size: 11px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--accent2); text-decoration: none; transition: all 0.15s;
}
.link-chip:hover { border-color: var(--accent); background: rgba(99,102,241,0.1); }
.link-chip.live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.link-chip.pending::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--yellow); }
.link-chip.offline::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--text2); }

.analyst-note {
  background: var(--surface2); border-radius: 8px; padding: 12px 16px;
  font-size: 13px; line-height: 1.7; color: var(--text); margin-top: 8px;
  border-left: 2px solid var(--accent2);
}
.analyst-note strong { color: var(--accent2); }

.todo-list { list-style: none; }
.todo-list li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
  font-size: 13px; line-height: 1.6;
}
.todo-list li:last-child { border-bottom: none; }
.todo-icon {
  width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; margin-top: 2px;
}
.todo-icon.red { background: rgba(239,68,68,0.15); color: var(--red); }
.todo-icon.yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
.todo-icon.blue { background: rgba(99,102,241,0.15); color: var(--accent2); }
.todo-icon.green { background: rgba(34,197,94,0.15); color: var(--green); }

.direction-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 16px;
  border-left: 4px solid var(--green);
}
.direction-card h4 { font-size: 14px; color: var(--green); margin-bottom: 8px; }
.direction-card p { font-size: 13px; line-height: 1.7; }

.sub-tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.sub-tab {
  padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 12px;
  cursor: pointer; transition: all 0.15s;
}
.sub-tab.active { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,0.1); }

.ranking-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; }
.ranking-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
.ranking-table td:first-child { font-weight: 600; color: var(--accent2); width: 30px; }
.ranking-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }

/* Main page insight summary */
.main-insight-hero {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 20px;
  border-left: 4px solid var(--accent);
}
.main-insight-hero h2 { font-size: 17px; margin-bottom: 14px; color: var(--accent2); }
.main-insight-kpis {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px; margin-bottom: 16px;
}
.main-insight-kpi { text-align: center; }
.main-insight-kpi .mik-value { font-size: 22px; font-weight: 700; }
.main-insight-kpi .mik-label { font-size: 11px; color: var(--text2); }

.main-actions-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 20px;
}
.main-actions-wrap h3 { font-size: 15px; margin-bottom: 12px; color: var(--text); }
.main-action-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
  cursor: pointer; transition: background 0.15s;
  font-size: 13px; line-height: 1.6;
}
.main-action-row:hover { background: var(--surface2); }
.main-action-row .todo-icon { flex-shrink: 0; }
.main-action-row .action-detail-link {
  margin-left: auto; flex-shrink: 0; font-size: 11px;
  color: var(--accent2); opacity: 0.6; transition: opacity 0.15s;
  white-space: nowrap; padding-left: 8px;
}
.main-action-row:hover .action-detail-link { opacity: 1; }

.view-all-link {
  display: inline-block; margin-top: 8px; font-size: 12px;
  color: var(--accent2); cursor: pointer; text-decoration: none;
  padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
  transition: all 0.15s;
}
.view-all-link:hover { border-color: var(--accent); background: rgba(99,102,241,0.1); }

/* Country status mini cards on main page */
.country-status-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px; margin-top: 12px;
}
.country-status-mini {
  padding: 8px 12px; border-radius: 8px;
  background: var(--surface2); cursor: pointer;
  transition: all 0.15s; border: 1px solid transparent;
  font-size: 12px;
}
.country-status-mini:hover { border-color: var(--accent); }
.country-status-mini .csm-name { font-weight: 600; margin-bottom: 2px; }
.country-status-mini .csm-stat { color: var(--text2); font-size: 11px; }

/* Detail data section */
.detail-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 40px 0 20px; padding-top: 24px;
  border-top: 2px solid var(--border);
}
.detail-divider span {
  font-size: 13px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
}
.detail-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.detail-tabs {
  display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap;
}
.detail-tab {
  padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 12px;
  cursor: pointer; transition: all 0.15s;
}
.detail-tab.active { border-color: var(--accent); color: var(--accent2); background: rgba(99,102,241,0.1); }
.detail-tab:hover:not(.active) { color: var(--text); border-color: var(--text2); }
.detail-content { display: none; }
.detail-content.active { display: block; }

/* Scroll-to-detail link */
.scroll-to-detail {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--accent2); cursor: pointer;
  opacity: 0.7; transition: opacity 0.15s; text-decoration: none;
}
.scroll-to-detail:hover { opacity: 1; text-decoration: underline; }

/* Page Links Drawer */
.links-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.links-overlay.open { opacity: 1; pointer-events: auto; }
.links-drawer {
  position: fixed; top: 0; right: -400px; width: 380px; max-width: 90vw;
  height: 100vh; background: var(--surface); border-left: 1px solid var(--border);
  z-index: 301; display: flex; flex-direction: column;
  transition: right 0.3s ease;
  box-shadow: -4px 0 24px rgba(0,0,0,0.2);
}
.links-drawer.open { right: 0; }
.links-drawer-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.links-drawer-header h3 { font-size: 15px; white-space: nowrap; }
.links-search {
  flex: 1; padding: 6px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 12px; outline: none;
}
.links-search:focus { border-color: var(--accent); }
.links-close {
  background: none; border: none; color: var(--text2);
  font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1;
}
.links-close:hover { color: var(--text); }
.links-drawer-body {
  flex: 1; overflow-y: auto; padding: 12px 16px;
}
.links-country-group { margin-bottom: 16px; }
.links-country-label {
  font-size: 12px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.links-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 6px;
  text-decoration: none; color: var(--text);
  font-size: 13px; transition: background 0.12s;
}
.links-item:hover { background: var(--surface2); }
.links-item .li-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.links-item .li-dot.live { background: var(--green); }
.links-item .li-dot.pending { background: var(--yellow); }
.links-item .li-dot.offline { background: var(--text2); }
.links-item .li-type {
  font-size: 11px; color: var(--text2); margin-left: auto; white-space: nowrap;
}

/* =========== Intelligence Brief =========== */
.intel-brief {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.intel-brief::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--green), var(--orange));
}
.intel-brief-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.intel-brief-header h2 { font-size: 17px; font-weight: 700; }
.intel-brief-header .ai-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(34,197,94,0.2));
  color: var(--accent2); font-weight: 600; letter-spacing: 0.5px;
}
.intel-brief-actions { display: flex; gap: 6px; }
.brief-item {
  padding: 14px 16px; border-radius: 10px; margin-bottom: 10px;
  background: var(--surface2); border-left: 4px solid;
  transition: all 0.2s;
}
.brief-item:hover { transform: translateX(2px); }
.brief-item.alert { border-left-color: var(--red); }
.brief-item.watch { border-left-color: var(--yellow); }
.brief-item.good { border-left-color: var(--green); }
.brief-item .brief-signal {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 1px 8px; border-radius: 4px; margin-right: 8px;
  vertical-align: middle;
}
.brief-item.alert .brief-signal { background: rgba(239,68,68,0.15); color: var(--red); }
.brief-item.watch .brief-signal { background: rgba(234,179,8,0.15); color: var(--yellow); }
.brief-item.good .brief-signal { background: rgba(34,197,94,0.15); color: var(--green); }
.brief-item .brief-text { font-size: 13px; line-height: 1.7; }
.brief-item .brief-detail {
  display: none; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border); font-size: 12px; color: var(--text2);
}
.brief-item .brief-detail.open { display: block; }
.brief-item .see-data-btn {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 8px; font-size: 11px; color: var(--accent2);
  cursor: pointer; background: none; border: none;
  transition: opacity 0.15s; opacity: 0.7;
}
.brief-item .see-data-btn:hover { opacity: 1; }
.brief-skeleton {
  animation: pulse 1.5s ease-in-out infinite;
}
.brief-skeleton .skel-line {
  height: 14px; border-radius: 4px; background: var(--surface2); margin-bottom: 10px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.brief-no-key {
  text-align: center; padding: 24px; color: var(--text2); font-size: 13px;
}
.brief-no-key .setup-link {
  color: var(--accent2); cursor: pointer; text-decoration: underline;
}

/* =========== Signal Cards =========== */
.signal-cards-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.signal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; cursor: pointer;
  transition: all 0.2s; border-left: 4px solid;
}
.signal-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
.signal-card.sig-red { border-left-color: var(--red); }
.signal-card.sig-yellow { border-left-color: var(--yellow); }
.signal-card.sig-green { border-left-color: var(--green); }
.signal-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.signal-card-top h3 { font-size: 15px; font-weight: 600; }
.signal-badge {
  font-size: 10px; padding: 2px 10px; border-radius: 10px; font-weight: 700;
}
.signal-badge.sig-red { background: rgba(239,68,68,0.15); color: var(--red); }
.signal-badge.sig-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
.signal-badge.sig-green { background: rgba(34,197,94,0.15); color: var(--green); }
.signal-card-metrics {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px;
}
.signal-card-metrics .scm-val { font-size: 18px; font-weight: 700; }
.signal-card-metrics .scm-label { font-size: 10px; color: var(--text2); }
.signal-card-metrics .scm-delta { font-size: 11px; }
.signal-card-note {
  font-size: 12px; color: var(--text2); font-style: italic;
  padding: 6px 10px; background: var(--surface2); border-radius: 6px;
}
.signal-card-expanded {
  display: none; margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.signal-card-expanded.open { display: block; }

/* =========== Action To-Do Checkboxes =========== */
.todo-check-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-radius: 8px; margin-bottom: 6px;
  transition: all 0.15s; border: 1px solid transparent;
}
.todo-check-item:hover { background: var(--surface2); }
.todo-check-item.done { opacity: 0.45; }
.todo-check-item.done .todo-check-text { text-decoration: line-through; }
.todo-check-input {
  width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0;
  accent-color: var(--accent);
}
.todo-check-text { font-size: 13px; line-height: 1.6; flex: 1; }
.todo-check-priority {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  font-weight: 600; flex-shrink: 0; margin-top: 3px;
}
.todo-check-priority.p-high { background: rgba(239,68,68,0.2); color: var(--red); }
.todo-check-priority.p-medium { background: rgba(234,179,8,0.2); color: var(--yellow); }
.todo-check-priority.p-low { background: rgba(34,197,94,0.2); color: var(--green); }
.todo-insight-ref {
  font-size: 11px; color: var(--accent2); cursor: pointer;
  background: none; border: none; margin-top: 4px; opacity: 0.7;
}
.todo-insight-ref:hover { opacity: 1; text-decoration: underline; }

/* =========== Today's Focus Widget =========== */
.todays-focus {
  position: fixed; bottom: 24px; right: 24px; z-index: 150;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 20px;
  width: 320px; max-width: calc(100vw - 48px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  transition: all 0.3s; transform: translateY(0);
}
.todays-focus.collapsed {
  width: auto; padding: 10px 16px; cursor: pointer;
}
.todays-focus.hidden { transform: translateY(calc(100% + 40px)); pointer-events: none; }
.todays-focus-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; font-size: 12px; font-weight: 700;
  color: var(--accent2); text-transform: uppercase; letter-spacing: 0.5px;
}
.todays-focus-close {
  background: none; border: none; color: var(--text2);
  cursor: pointer; font-size: 16px; line-height: 1;
}
.todays-focus-close:hover { color: var(--text); }
.todays-focus-item {
  font-size: 12px; line-height: 1.6; padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.todays-focus-item:last-child { border-bottom: none; }

/* =========== Settings Modal =========== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 400; display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px; width: 420px; max-width: 90vw;
}
.modal-box h3 { font-size: 16px; margin-bottom: 16px; }
.modal-box label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
.modal-box input[type="password"] {
  width: 100%; padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 13px; margin-bottom: 12px;
}
.modal-box input[type="password"]:focus { border-color: var(--accent); outline: none; }
.modal-box .modal-warn {
  font-size: 11px; color: var(--yellow); margin-bottom: 12px;
  padding: 8px; background: rgba(234,179,8,0.08); border-radius: 6px;
}
.modal-box .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* =========== Primary Tabs =========== */
.primary-tabs {
  display: flex; gap: 4px; margin-bottom: 24px;
  background: var(--surface); border-radius: 10px; padding: 4px;
  width: fit-content; flex-wrap: wrap;
}
.primary-tab {

  background: transparent; color: var(--text2); font-size: 13px;
  cursor: pointer; transition: all 0.15s; font-weight: 500;
}
.primary-tab.active { background: var(--accent); color: white; }
.primary-tab:hover:not(.active) { color: var(--text); }
.ptab-content { display: none; }
.ptab-content.active { display: block; }

function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en[key]) || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lg_dash_lang', lang);
  document.documentElement.setAttribute('data-lang', lang);
  applyI18n();
  if (DATA) render();
  // Update toggle active state
  document.querySelectorAll('#langToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.val === lang);
  });
}

function setTheme(theme) {
  currentTheme = theme;
  localStorage.setItem('lg_dash_theme', theme);
  document.documentElement.setAttribute('data-theme', theme);
  // Re-render charts for new colors
  if (DATA) render();
  document.querySelectorAll('#themeToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.val === theme);
  });
}

async function callClaudeAPI(prompt) {
  const key = localStorage.getItem('lg_dash_api_key');
  if (!key) throw new Error('No API key');
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2048,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }
  const data = await resp.json();
  return data.content[0].text;
}

function buildBriefPrompt() {
  const expert = DATA.expert || {};
  const pct = expert.per_content_type || {};
  const reports = expert.country_reports || {};
  const ex = expert.executive || {};
  const insights = DATA.insights || [];
  const months = DATA.meta.months_available || [];
  const latest = months[months.length - 1] || '';

  // Country rankings
  const countriesBySession = Object.entries(reports)
    .sort((a,b) => (b[1].total_sessions||0) - (a[1].total_sessions||0));
  const top3 = countriesBySession.slice(0, 3).map(([c,r]) =>
    `${c}: ${r.total_sessions} sessions, MoM ${(r.session_change_pct||0).toFixed(1)}%, PLP conv ${((r.avg_plp_conv||0)*100).toFixed(1)}%, status: ${r.status}`
  ).join('\\n');
  const bottom3 = countriesBySession.slice(-3).map(([c,r]) =>
    `${c}: ${r.total_sessions} sessions, MoM ${(r.session_change_pct||0).toFixed(1)}%, PLP conv ${((r.avg_plp_conv||0)*100).toFixed(1)}%, status: ${r.status}`
  ).join('\\n');

  // Big MoM changes
  const bigChanges = Object.entries(reports)
    .filter(([,r]) => Math.abs(r.session_change_pct||0) > 20)
    .map(([c,r]) => `${c}: ${(r.session_change_pct||0).toFixed(1)}% MoM change`)
    .join(', ') || 'None';

  // Content type split
  let ctypeSplit = '';
  for (const [ct, d] of Object.entries(pct)) {
    const e = d.executive || {};
    ctypeSplit += `${ct}: ${e.total_sessions||0} sessions, PLP ${((e.avg_plp_conv||0)*100).toFixed(1)}%, MoM ${(e.session_change_pct||0).toFixed(1)}%\\n`;
  }

  // TV vs Monitor
  const cats = expert.category_reports || {};
  let catSplit = '';
  for (const [cat, d] of Object.entries(cats)) {
    catSplit += `${cat}: ${d.total_sessions||0} sessions, PLP ${((d.avg_plp_conv||0)*100).toFixed(1)}%\\n`;
  }

  // Seasonal context
  const now = new Date();
  const monthNum = now.getMonth();
  const season = monthNum >= 2 && monthNum <= 4 ? 'Spring' : monthNum >= 5 && monthNum <= 7 ? 'Summer' : monthNum >= 8 && monthNum <= 10 ? 'Fall' : 'Winter';
  const hemisphereNote = 'Note: BR and MX are in the Southern Hemisphere (seasons reversed). Most other countries are Northern Hemisphere.';

  // Top insights from data
  const topInsights = insights.slice(0, 8).map(i => `[${i.priority}] ${i.page}: ${i.message}`).join('\\n');

  return `You are a senior digital marketing analyst briefing an LG Electronics content team manager on their Buying Guide pages' GA performance.

DATA CONTEXT (${latest} 2026, ${season} season):
${hemisphereNote}

OVERALL: ${ex.total_sessions||0} total sessions, ${ex.total_clicks||0} clicks, PLP conv ${((ex.avg_plp_conv||0)*100).toFixed(1)}%, Purchase conv ${((ex.avg_purchase_conv||0)*100).toFixed(2)}%, MoM session change: ${(ex.session_change_pct||0).toFixed(1)}%

TOP 3 COUNTRIES (by sessions):
${top3}

BOTTOM 3 COUNTRIES:
${bottom3}

NOTABLE MoM CHANGES (>20%): ${bigChanges}

CONTENT TYPE BREAKDOWN:
${ctypeSplit}

CATEGORY BREAKDOWN (TV vs Monitor):
${catSplit}

KEY DATA INSIGHTS:
${topInsights}

TASK: Generate exactly 5 intelligence briefing bullets. Each bullet must:
1. Have a signal level: "alert" (urgent problem), "watch" (needs monitoring), or "good" (positive signal)
2. Be specific with country names, numbers, and percentages from the data
3. Include a concrete recommended action
4. Be written in a confident, analytical tone

Return ONLY a JSON array (no markdown, no code fences) with this structure:
[
  {
    "signal": "alert|watch|good",
    "text_en": "The English insight text with specific numbers and recommended action",
    "text_ko": "Same insight in Korean",
    "detail_en": "Supporting data: specific metrics that triggered this insight",
    "detail_ko": "Same detail in Korean",
    "data_tab": "overview|acquisition|behavior|conversion"
  }
]`;
}

async function renderIntelBrief(forceRefresh = false) {
  const el = document.getElementById('intelBriefPanel');
  if (!el) return;
  const apiKey = localStorage.getItem('lg_dash_api_key');

  // No API key — show setup prompt
  if (!apiKey) {
    el.innerHTML = `<div class="intel-brief">
      <div class="intel-brief-header"><h2>${t('brief_title')}</h2><span class="ai-badge">AI-POWERED</span></div>
      <div class="brief-no-key">
        <p>${t('brief_no_key')}</p>
        <p style="margin-top:8px;"><span class="setup-link" onclick="openSettings()">${t('brief_setup')}</span></p>
      </div>
    </div>`;
    return;
  }

  // Check cache
  if (!forceRefresh) {
    const cached = localStorage.getItem('lg_dash_brief_cache');
    if (cached) {
      try {
        const { items, timestamp } = JSON.parse(cached);
        const age = Date.now() - timestamp;
        if (age < 3600000 && items) { // 1 hour cache
          renderBriefItems(el, items, true);
          return;
        }
      } catch {}
    }
  }

  // Show loading skeleton
  if (briefLoading) return;
  briefLoading = true;
  el.innerHTML = `<div class="intel-brief">
    <div class="intel-brief-header"><h2>${t('brief_title')}</h2><span class="ai-badge">AI-POWERED</span></div>
    <div class="brief-skeleton">
      <div class="skel-line" style="width:90%"></div>
      <div class="skel-line" style="width:75%"></div>
      <div class="skel-line" style="width:85%"></div>
      <div class="skel-line" style="width:60%"></div>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--text2);margin-top:8px;">${t('brief_loading')}</p>
  </div>`;

  try {
    const prompt = buildBriefPrompt();
    const raw = await callClaudeAPI(prompt);
    // Parse JSON from response (handle possible code fences)
    let cleaned = raw.trim();
    if (cleaned.startsWith('```')) cleaned = cleaned.replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'');
    const items = JSON.parse(cleaned);
    localStorage.setItem('lg_dash_brief_cache', JSON.stringify({ items, timestamp: Date.now() }));
    renderBriefItems(el, items, false);
  } catch (e) {
    el.innerHTML = `<div class="intel-brief">
      <div class="intel-brief-header"><h2>${t('brief_title')}</h2><span class="ai-badge">AI-POWERED</span></div>
      <p style="color:var(--red);font-size:13px;">${t('brief_error')} ${e.message || ''}</p>
      <button class="btn btn-outline" style="margin-top:8px;" onclick="renderIntelBrief(true)">${t('brief_refresh')}</button>
    </div>`;
  } finally {
    briefLoading = false;
  }
}

function switchToPrimaryTab(tabName) {
  document.querySelectorAll('#primaryTabs .primary-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.ptab-content').forEach(c => { c.classList.remove('active'); c.style.display = 'none'; });

  const panel = document.getElementById('ptab-' + tabName);
  if (panel) { panel.classList.add('active'); panel.style.display = 'block'; }

  if (DATA) render();

function scrollToDetail(dtab) {
  // Switch detail tab
  if (dtab) {
    document.querySelectorAll('#detailTabs .detail-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.detail-content').forEach(c => c.classList.remove('active'));
    const btn = document.querySelector(`#detailTabs .detail-tab[data-dtab="${dtab}"]`);
    if (btn) btn.classList.add('active');
    const panel = document.getElementById('dtab-' + dtab);
    if (panel) panel.classList.add('active');
  }
  // Scroll to detail section
  document.getElementById('detailDataSection').scrollIntoView({ behavior: 'smooth' });
}

// ============================================================
// Data Loading
// ============================================================
async function loadData() {
  try {
    // Try API first (local server), fallback to static file (GitHub Pages)
    let resp;
    try {
      resp = await fetch('/api/data');
      if (!resp.ok) throw new Error();
    } catch {
      resp = await fetch('./data.json');
    }
    DATA = await resp.json();
    render();
  } catch (e) {
    showToast(t('load_fail'));
  }
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.querySelector('[data-i18n]').textContent = t('refreshing');
  try {
    // Try server-side refresh (local), fallback to static reload (deployed)
    let resp;
    try {
      resp = await fetch('/api/refresh');
      if (!resp.ok) throw new Error();
      const result = await resp.json();
      if (result.status === 'success') {
        showToast(t('refresh_success'));
        await loadData();
        return;
      } else {
        showToast(t('refresh_fail') + ': ' + result.message);
        return;
      }
    } catch {
      // Static mode: just re-fetch data.json
      await loadData();
      showToast(t('refresh_success'));
    }
  } catch (e) {
    showToast(t('refresh_fail') + ': ' + e.message);
  } finally {
    btn.disabled = false;
    btn.querySelector('[data-i18n]').textContent = t('refresh');
  }
}

function renderFilters() {
  const el = document.getElementById('filters');
  const ctypes = DATA.meta.content_types || ['lineup'];

  // Content type filter
  let html = '';
  if (ctypes.length > 1) {
    html += `<button class="btn btn-outline active" data-filter="ctype" data-val="ALL">${t('all_content_types')}</button>`;
    ctypes.forEach(ct => {
      html += `<button class="btn btn-outline" data-filter="ctype" data-val="${ct}">${t('ctype_' + ct)}</button>`;
    });
    html += '<span style="width:12px"></span>';
  }

  html += `<button class="btn btn-outline active" data-filter="country" data-val="ALL">${t('all_countries')}</button>`;
  DATA.meta.countries.forEach(c => {
    html += `<button class="btn btn-outline" data-filter="country" data-val="${c}">${countryName(c)}</button>`;
  });
  html += '<span style="width:8px"></span>';
  html += `<button class="btn btn-outline active" data-filter="category" data-val="ALL">${t('all_categories')}</button>`;
  DATA.meta.categories.forEach(c => {

  });

      btn.classList.add('active');
      if (filterType === 'country') selectedCountry = val;
      else if (filterType === 'ctype') selectedContentType = val;
      else selectedCategory = val;
      render();
    });
  });
}

function getFilteredSheets() {
  return Object.entries(DATA.monthly_data).filter(([key, val]) => {
    if (selectedContentType !== 'ALL' && (val.content_type || 'lineup') !== selectedContentType) return false;
    if (selectedCountry !== 'ALL' && val.country !== selectedCountry) return false;
    if (selectedCategory !== 'ALL' && val.category !== selectedCategory) return false;
    return true;
  });
}

function getMonths() { return DATA.meta.months_available; }
function getLatestMonth() { const m = getMonths(); return m[m.length - 1]; }
function getPrevMonth() { const m = getMonths(); return m.length > 1 ? m[m.length - 2] : null; }

function findMetric(metrics, ...keywords) {
  for (const [key, val] of Object.entries(metrics)) {
    const lk = key.toLowerCase();
    if (keywords.every(kw => lk.includes(kw.toLowerCase()))) return val;
  }
  return null;
}

function getMetricValue(metrics, month, ...keywords) {
  let m = findMetric(metrics, ...keywords);
  // Fallback: try spec_library variants if lineup keywords fail
  if (!m) {
    const alt = keywords.map(kw => {
      if (kw === 'lineup') return 'spec_library';
      if (kw === 'tv_lineup') return 'tv_spec_library';
      if (kw === 'monitor_lineup') return 'monitor_spec_library';
      if (kw === 'line_up') return 'spec_library';
      if (kw === 'line_up_guide') return 'spec_library';
      if (kw === 'guide_event_click') return 'library_event_click';
      return kw;
    });
    if (alt.join() !== keywords.join()) m = findMetric(metrics, ...alt);
  }
  if (!m || !m.monthly || !m.monthly[month]) return null;
  return m.monthly[month];
}

function formatNum(n, decimals = 0) {
  if (n == null) return '—';
  if (Math.abs(n) < 1 && n !== 0) return (n * 100).toFixed(1) + '%';
  return n.toLocaleString(currentLang === 'ko' ? 'ko-KR' : 'en-US', { maximumFractionDigits: decimals });
}

function calcChange(curr, prev) {
  if (!prev || prev === 0 || !curr) return null;
  return ((curr - prev) / Math.abs(prev)) * 100;
}

function getChartColors() {
  const style = getComputedStyle(document.documentElement);
  return {
    grid: style.getPropertyValue('--chart-grid').trim() || 'rgba(42,42,58,0.5)',
    text: style.getPropertyValue('--chart-text').trim() || '#8888a0',
  };
}

function renderOverview() {
  const months = getMonths();
  const latest = getLatestMonth();
  const prev = getPrevMonth();
  const sheets = getFilteredSheets();

  document.getElementById('latestMonthBadge').textContent = latest + ' 2026';

  let totalSessions=0, prevSessions=0, totalPageViews=0, prevPageViews=0;
  let totalEngaged=0, prevEngaged=0, totalClicks=0, prevClicks=0;
  let convRates=[], prevConvRates=[];

  sheets.forEach(([key, data]) => {
    const m = data.metrics_2026;
    const sess = getMetricValue(m,latest,'lineup','session')||getMetricValue(m,latest,'tv_lineup','session')||getMetricValue(m,latest,'monitor_lineup','session')||0;
    totalSessions+=sess;
    if(prev) prevSessions+=getMetricValue(m,prev,'lineup','session')||getMetricValue(m,prev,'tv_lineup','session')||getMetricValue(m,prev,'monitor_lineup','session')||0;
    const pv=getMetricValue(m,latest,'line_up')||getMetricValue(m,latest,'lineup')||0;
    if(pv<10000){totalPageViews+=pv; if(prev) prevPageViews+=getMetricValue(m,prev,'line_up')||getMetricValue(m,prev,'lineup')||0;}
    totalEngaged+=getMetricValue(m,latest,'engaged')||0;
    if(prev) prevEngaged+=getMetricValue(m,prev,'engaged')||0;
    totalClicks+=getMetricValue(m,latest,'event_click')||getMetricValue(m,latest,'guide_event_click')||0;
    if(prev) prevClicks+=getMetricValue(m,prev,'event_click')||getMetricValue(m,prev,'guide_event_click')||0;
    const conv=getMetricValue(m,latest,'plp_conversion'); if(conv!=null) convRates.push(conv);
    if(prev){const pc=getMetricValue(m,prev,'plp_conversion'); if(pc!=null) prevConvRates.push(pc);}
  });

  const avgConv=convRates.length?convRates.reduce((a,b)=>a+b,0)/convRates.length:null;
  const prevAvgConv=prevConvRates.length?prevConvRates.reduce((a,b)=>a+b,0)/prevConvRates.length:null;

  document.getElementById('kpiGrid').innerHTML=[
    kpiCard(t('kpi_sessions'),totalSessions,calcChange(totalSessions,prevSessions)),
    kpiCard(t('kpi_pageviews'),totalPageViews,calcChange(totalPageViews,prevPageViews)),
    kpiCard(t('kpi_engaged'),totalEngaged,calcChange(totalEngaged,prevEngaged)),
    kpiCard(t('kpi_clicks'),totalClicks,calcChange(totalClicks,prevClicks)),
    kpiCard(t('kpi_plp_conv'),avgConv,calcChange(avgConv,prevAvgConv)),
    kpiCard(t('kpi_pages_tracked'),sheets.length,null),
  ].join('');

  const chartsEl=document.getElementById('overviewCharts');
  chartsEl.innerHTML=`
    <div class="chart-card"><h3>${t('chart_sessions_country')}</h3><canvas id="chartSessionsByCountry"></canvas></div>
    <div class="chart-card"><h3>${t('chart_pv_trend')}</h3><canvas id="chartPageViewsTrend"></canvas></div>
    <div class="chart-card"><h3>${t('chart_engagement')}</h3><canvas id="chartEngagementRate"></canvas></div>
    <div class="chart-card"><h3>${t('chart_conversion')}</h3><canvas id="chartConversion"></canvas></div>
  `;

  const countrySessionData={};
  sheets.forEach(([key,data])=>{
    const label=data.country;
    const sess=getMetricValue(data.metrics_2026,latest,'lineup','session')||getMetricValue(data.metrics_2026,latest,'tv_lineup','session')||getMetricValue(data.metrics_2026,latest,'monitor_lineup','session')||0;
    countrySessionData[label]=(countrySessionData[label]||0)+sess;
  });
  createChart('chartSessionsByCountry','bar',{
    labels:Object.keys(countrySessionData).map(c=>countryName(c)),
    datasets:[{data:Object.values(countrySessionData),backgroundColor:Object.keys(countrySessionData).map(c=>COLORS[c]||'#6366f1'),borderRadius:6}]
  },{plugins:{legend:{display:false}}});

  if(months.length>0){
    const trendDatasets=[];
    sheets.forEach(([key,data])=>{
      const m=data.metrics_2026;
      const pvMetric=findMetric(m,'line_up')||findMetric(m,'lineup');
      if(!pvMetric) return;
      const vals=months.map(mo=>pvMetric.monthly[mo]||null);
      if(vals.every(v=>v===null||v>5000)) return;
      trendDatasets.push({label:`${data.category} ${countryName(data.country)}`,data:vals,borderColor:COLORS[data.country]||'#6366f1',borderWidth:2,tension:0.3,pointRadius:4,fill:false});
    });

  }

  const engLabels=[],engData=[];
  sheets.forEach(([key,data])=>{
    const rate=getMetricValue(data.metrics_2026,latest,'engagem')||getMetricValue(data.metrics_2026,latest,'engagement');
    if(rate!=null&&rate<=2){engLabels.push(`${data.category} ${countryName(data.country)}`);engData.push(rate);}
  });
  createChart('chartEngagementRate','bar',{
    labels:engLabels,
    datasets:[{data:engData.map(v=>v*100),backgroundColor:engData.map(v=>v>=0.7?'rgba(34,197,94,0.7)':v>=0.5?'rgba(234,179,8,0.7)':'rgba(239,68,68,0.7)'),borderRadius:6}]
  },{plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:'%'}}}});

  const convLabels=[],convData=[];
  sheets.forEach(([key,data])=>{
    const rate=getMetricValue(data.metrics_2026,latest,'plp_conversion');
    if(rate!=null){convLabels.push(`${data.category} ${countryName(data.country)}`);convData.push(rate);}
  });
  createChart('chartConversion','bar',{
    labels:convLabels,datasets:[{data:convData.map(v=>v*100),backgroundColor:'rgba(99,102,241,0.7)',borderRadius:6}]
  },{plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:'%'}}}});

  renderComparisonTable(sheets,latest,prev);
}

function renderComparisonTable(sheets,latest,prev){
  const table=document.getElementById('comparisonTable');
  let html=`<thead><tr><th>${t('th_page')}</th><th>${t('th_sessions')}</th><th>${t('th_pageviews')}</th><th>${t('th_engagement')}</th><th>${t('th_event_clicks')}</th><th>${t('th_plp_conv')}</th><th>${t('th_purch_conv')}</th><th>${t('th_mom_sessions')}</th></tr></thead><tbody>`;

  sheets.forEach(([key,data])=>{
    const m=data.metrics_2026;
    const ctypeTag=selectedContentType==='ALL'&&data.content_type?(data.content_type==='feature_library'?' [FL]':' [LG]'):'';
    const label=`${data.category} ${countryName(data.country)}${ctypeTag}`;
    const sess=getMetricValue(m,latest,'lineup','session')||getMetricValue(m,latest,'tv_lineup','session')||getMetricValue(m,latest,'monitor_lineup','session')||0;
    const prevSess=prev?(getMetricValue(m,prev,'lineup','session')||getMetricValue(m,prev,'tv_lineup','session')||getMetricValue(m,prev,'monitor_lineup','session')||0):0;
    const pv=getMetricValue(m,latest,'line_up')||0;
    const eng=getMetricValue(m,latest,'engagem');
    const clicks=getMetricValue(m,latest,'event_click')||getMetricValue(m,latest,'guide_event_click')||0;
    const plpConv=getMetricValue(m,latest,'plp_conversion');
    const purchConv=getMetricValue(m,latest,'purchase_conversion');
    const change=calcChange(sess,prevSess);
    html+=`<tr><td><strong>${label}</strong></td><td>${formatNum(sess)}</td><td>${formatNum(pv)}</td><td>${eng!=null?formatNum(eng):'—'}</td><td>${formatNum(clicks)}</td><td>${plpConv!=null?formatNum(plpConv):'—'}</td><td>${purchConv!=null?formatNum(purchConv):'—'}</td><td class="${change>0?'kpi-change up':change<0?'kpi-change down':''}">${change!=null?(change>0?'+':'')+change.toFixed(1)+'%':'—'}</td></tr>`;
  });
  html+='</tbody>';
  table.innerHTML=html;
}

function renderCountryReports(expert){

  let html='';

  // Sort: filter by selected country/category
  let countries=Object.keys(reports).sort((a,b)=>(reports[b].total_sessions||0)-(reports[a].total_sessions||0));
  if(selectedCountry!=='ALL') countries=countries.filter(c=>c===selectedCountry);

  countries.forEach(code=>{
    const r=reports[code];
    const statusLabel=t(r.status)||r.status;
    const momSign=(r.session_change_pct||0)>=0?'+':'';

    // Link chips
    const links=(r.links||[]).filter(l=>l.link).map(l=>{
      const statusCls=l.live_status==='LIVE'?'live':l.live_status?'pending':'offline';
      const label=l.type||l.category||'Link';
      return `<a href="${l.link}" target="_blank" class="link-chip ${statusCls}" title="${l.category} ${l.type}">${label}</a>`;
    }).join('');

    // Per-product breakdown
    let productHtml='';
    if(r.per_product){
      const cats=Object.keys(r.per_product);
      if(selectedCategory!=='ALL') {
        const filtered=cats.filter(c=>c.toUpperCase()===selectedCategory.toUpperCase());
        if(filtered.length>0){
          filtered.forEach(cat=>{
            productHtml+=renderProductBlock(cat,r.per_product[cat]);
          });
        }
      } else {
        cats.forEach(cat=>{
          productHtml+=renderProductBlock(cat,r.per_product[cat]);
        });
      }
    }

    // Analyst notes
    let notesHtml='';

function getSeasonContext(countryCode) {
  const m = new Date().getMonth();
  const southern = ['BR', 'MX'];
  const isSouthern = southern.includes(countryCode);
  const effectiveMonth = isSouthern ? (m + 6) % 12 : m;
  if (effectiveMonth >= 2 && effectiveMonth <= 4) return t('signal_context_spring');
  if (effectiveMonth >= 5 && effectiveMonth <= 7) return t('signal_context_summer');
  if (effectiveMonth >= 8 && effectiveMonth <= 10) return t('signal_context_fall');
  return t('signal_context_winter');
}

function getSignalLevel(momPct) {
  if (momPct <= -15) return 'sig-red';
  if (momPct >= 15) return 'sig-green';
  return 'sig-yellow';
}

function renderCountrySignalCards() {
  const el = document.getElementById('signalCardsPanel');
  if (!el) return;
  const expert = DATA.expert || {};
  const pctData = expert.per_content_type || {};
  const activeExpert = (selectedContentType !== 'ALL' && pctData[selectedContentType]) ? pctData[selectedContentType] : expert;
  const reports = activeExpert.country_reports || {};

  let countries = Object.keys(reports).sort((a,b) => (reports[b].total_sessions||0) - (reports[a].total_sessions||0));
  if (selectedCountry !== 'ALL') countries = countries.filter(c => c === selectedCountry);

  let html = '';
  countries.forEach(code => {
    const r = reports[code];
    const momPct = r.session_change_pct || 0;
    const sig = getSignalLevel(momPct);
    const sigLabel = sig === 'sig-red' ? t('signal_alert') : sig === 'sig-green' ? t('signal_good') : t('signal_watch');
    const momSign = momPct >= 0 ? '+' : '';
    const arrow = momPct > 0 ? ' &#9650;' : momPct < 0 ? ' &#9660;' : ' &#9654;';
    const context = getSeasonContext(code);

    // Analyst note (first one if available)
    const firstNote = (r.analyst_notes && r.analyst_notes.length > 0) ? r.analyst_notes[0].notes[0] || '' : '';
    const noteText = firstNote || context;

    // Per-product breakdown for expanded view
    let expandedHtml = '';
    if (r.per_product) {
      expandedHtml += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:12px;">';
      for (const [cat, pd] of Object.entries(r.per_product)) {
        if (selectedCategory !== 'ALL' && cat.toUpperCase() !== selectedCategory.toUpperCase()) continue;
        expandedHtml += `<div style="background:var(--surface2);border-radius:8px;padding:12px;">
          <div style="font-weight:600;font-size:12px;color:var(--accent2);margin-bottom:6px;">${cat}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;">
            <div>${t('country_sessions')}: <strong>${formatNum(pd.sessions||0)}</strong></div>
            <div>${t('country_plp')}: <strong>${((pd.plp_conv||0)*100).toFixed(1)}%</strong></div>
            <div>${t('country_purchase')}: <strong>${((pd.purchase_conv||0)*100).toFixed(2)}%</strong></div>
            <div>${t('country_duration')}: <strong>${pd.duration?pd.duration+'s':'—'}</strong></div>
          </div>
        </div>`;
      }
      expandedHtml += '</div>';
    }

    // Links
    const links = (r.links || []).filter(l => l.link).map(l => {
      const sc = l.live_status === 'LIVE' ? 'live' : l.live_status ? 'pending' : 'offline';
      return `<a href="${l.link}" target="_blank" class="link-chip ${sc}">${l.type || l.category || 'Link'}</a>`;
    }).join('');

    // Analyst notes
    let notesHtml = '';
    (r.analyst_notes || []).forEach(an => {
      notesHtml += `<div class="analyst-note" style="margin-bottom:6px;"><strong>${an.page}</strong>${an.notes.map(n=>'<div style="margin-top:3px;">'+n+'</div>').join('')}</div>`;
    });

    html += `<div class="signal-card ${sig}" onclick="this.querySelector('.signal-card-expanded').classList.toggle('open')">
      <div class="signal-card-top">
        <h3>${countryName(code)} (${code})</h3>
        <span class="signal-badge ${sig}">${sigLabel}</span>
      </div>
      <div class="signal-card-metrics">
        <div><div class="scm-val">${formatNum(r.total_sessions||0)}</div><div class="scm-label">${t('country_sessions')}</div></div>
        <div><div class="scm-val"><span class="kpi-change ${momPct>=0?'up':'down'}">${momSign}${momPct.toFixed(1)}%${arrow}</span></div><div class="scm-label">MoM</div></div>
        <div><div class="scm-val">${((r.avg_plp_conv||0)*100).toFixed(1)}%</div><div class="scm-label">${t('country_plp')}</div></div>
      </div>
      <div class="signal-card-note">${noteText}</div>
      <div class="signal-card-expanded">
        <div class="country-metrics" style="margin-bottom:12px;">
          <div class="country-metric"><div class="cm-value">${formatNum(r.total_clicks||0)}</div><div class="cm-label">${t('country_clicks')}</div></div>
          <div class="country-metric"><div class="cm-value">${((r.avg_purchase_conv||0)*100).toFixed(2)}%</div><div class="cm-label">${t('country_purchase')}</div></div>
          <div class="country-metric"><div class="cm-value">${r.avg_duration?r.avg_duration+'s':'—'}</div><div class="cm-label">${t('country_duration')}</div></div>
        </div>
        ${expandedHtml}
        ${links ? `<div class="link-chips" style="margin-bottom:8px;">${links}</div>` : ''}
        ${notesHtml}
      </div>
      <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--text2);">${t('signal_expand')}</div>
    </div>`;
  });

  el.innerHTML = html ? `<div class="signal-cards-grid">${html}</div>` : '<p style="color:var(--text2);">No country data available.</p>';
}

  const reports = activeExpert.country_reports || {};
  const growing = [], stable = [], declining = [];
  Object.keys(reports).forEach(code => {
    const r = reports[code];
    const label = `<strong>${countryName(code)}</strong> (${formatNum(r.total_sessions||0)} sess, PLP ${((r.avg_plp_conv||0)*100).toFixed(0)}%)`;
    if (r.status === 'growing') growing.push(label);
    else if (r.status === 'stable') stable.push(label);
    else declining.push(label);
  });

  html += `<div class="exec-summary" style="margin-top:16px;"><h3>${lang==='ko'?'국가별 상태 분류':'Country Status Classification'}</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-top:12px;">
      ${growing.length?`<div style="background:rgba(34,197,94,0.08);border-radius:8px;padding:14px;border-left:3px solid var(--green);"><div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px;">${t('growing')} &#9650;</div>${growing.join('<br>')}</div>`:''}
      ${stable.length?`<div style="background:rgba(99,102,241,0.08);border-radius:8px;padding:14px;border-left:3px solid var(--accent2);"><div style="font-size:12px;font-weight:700;color:var(--accent2);margin-bottom:6px;">${t('stable')} &#9654;</div>${stable.join('<br>')}</div>`:''}
      ${declining.length?`<div style="background:rgba(239,68,68,0.08);border-radius:8px;padding:14px;border-left:3px solid var(--red);"><div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px;">${t('declining')} &#9660;</div>${declining.join('<br>')}</div>`:''}
    </div>
  </div>`;

  el.innerHTML = html;
}

// ============================================================
// Today's Focus Widget
// ============================================================
function renderTodaysFocus() {
  const el = document.getElementById('todaysFocus');
  if (!el) return;
  const insights = (DATA.insights || []).filter(i => i.priority === 'high').slice(0, 2);
  const todoState = getTodoState();

  if (insights.length === 0) {
    el.classList.add('hidden');
    return;
  }

  const isCollapsed = localStorage.getItem('lg_dash_focus_collapsed') === '1';
  if (isCollapsed) {
    el.className = 'todays-focus collapsed';
    el.innerHTML = `<span style="font-size:12px;font-weight:600;color:var(--accent2);" onclick="localStorage.removeItem('lg_dash_focus_collapsed');renderTodaysFocus();">${t('todays_focus')} (${insights.length})</span>`;
    return;
  }

  el.className = 'todays-focus';
  let html = `<div class="todays-focus-header"><span>${t('todays_focus')}</span><button class="todays-focus-close" onclick="localStorage.setItem('lg_dash_focus_collapsed','1');renderTodaysFocus();">&times;</button></div>`;
  insights.forEach(ins => {
    html += `<div class="todays-focus-item"><strong style="color:var(--red);font-size:11px;">${ins.page}</strong><br>${ins.message.substring(0, 120)}${ins.message.length > 120 ? '...' : ''}</div>`;
  });
  el.innerHTML = html;
}

function generateActionItems(sheets,latest,prev){
  const actions=[],months=getMonths();

  const decliningPages=[];
  sheets.forEach(([key,data])=>{const m=data.metrics_2026;if(!prev)return;const curr=getMetricValue(m,latest,'lineup','session')||getMetricValue(m,latest,'tv_lineup','session')||getMetricValue(m,latest,'monitor_lineup','session')||0;const prv=getMetricValue(m,prev,'lineup','session')||getMetricValue(m,prev,'tv_lineup','session')||getMetricValue(m,prev,'monitor_lineup','session')||0;if(prv>0&&curr<prv*0.8){decliningPages.push(`${data.category} ${countryName(data.country)} (${((curr-prv)/prv*100).toFixed(0)}%)`);}});
  if(decliningPages.length>0) actions.push({urgency:'urgent',icon:'!!',text:`<strong>${t('act_investigate')}</strong> ${decliningPages.join(', ')}. ${t('act_investigate_desc')}`});

  const lowEngPages=[];
  sheets.forEach(([key,data])=>{const rate=getMetricValue(data.metrics_2026,latest,'engagem');if(rate!=null&&rate<0.5){lowEngPages.push(`${data.category} ${countryName(data.country)} (${(rate*100).toFixed(0)}%)`);}});
  if(lowEngPages.length>0) actions.push({urgency:'improve',icon:'!',text:`<strong>${t('act_engagement')}</strong> ${lowEngPages.join(', ')} ${t('act_engagement_desc')}`});

  const highExitPages=[];
  sheets.forEach(([key,data])=>{const rate=getMetricValue(data.metrics_2026,latest,'exit_rate','line');if(rate!=null&&rate>0.5&&rate<=2){highExitPages.push(`${data.category} ${countryName(data.country)} (${(rate*100).toFixed(0)}%)`);}});
  if(highExitPages.length>0) actions.push({urgency:'improve',icon:'!',text:`<strong>${t('act_exit')}</strong> ${highExitPages.join(', ')} ${t('act_exit_desc')}`});

  const lowPurchPages=[];
  sheets.forEach(([key,data])=>{const rate=getMetricValue(data.metrics_2026,latest,'purchase_conversion');if(rate!=null&&rate<0.01){lowPurchPages.push(`${data.category} ${countryName(data.country)}`);}});
  if(lowPurchPages.length>0) actions.push({urgency:'monitor',icon:'i',text:`<strong>${t('act_purchase')}</strong> ${lowPurchPages.join(', ')} ${t('act_purchase_desc')}`});

  const lowOrganicPages=[];
  sheets.forEach(([key,data])=>{const org=getMetricValue(data.metrics_2026,latest,'organic')||0;const ext=getMetricValue(data.metrics_2026,latest,'external')||0;if(ext>0&&org/ext<0.3){lowOrganicPages.push(`${data.category} ${countryName(data.country)}`);}});
  if(lowOrganicPages.length>0) actions.push({urgency:'improve',icon:'!',text:`<strong>${t('act_seo')}</strong> ${lowOrganicPages.join(', ')} ${t('act_seo_desc')}`});

  actions.push({urgency:'monitor',icon:'i',text:`<strong>${t('act_monitor')}</strong> ${months.length} ${t('act_monitor_desc')}`});

  return actions;
}

function toggleLinksDrawer(open) {
  document.getElementById('linksOverlay').classList.toggle('open', open);
  document.getElementById('linksDrawer').classList.toggle('open', open);
  if (open) {
    document.getElementById('linksSearch').value = '';
    document.getElementById('linksSearch').placeholder = t('page_links_search');
    filterPageLinks('');
    setTimeout(() => document.getElementById('linksSearch').focus(), 300);
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') toggleLinksDrawer(false); });

function renderPageLinksDrawer() {
  if (!DATA || !DATA.pages) return;
  const body = document.getElementById('linksDrawerBody');
  const grouped = {};
  (DATA.pages || []).forEach(p => {
    if (!p.link) return;
    const country = p.country || 'Other';
    if (!grouped[country]) grouped[country] = [];
    grouped[country].push(p);
  });

  let html = '';
  Object.keys(grouped).sort().forEach(country => {
    html += `<div class="links-country-group" data-country="${country}">`;
    html += `<div class="links-country-label">${country}</div>`;
    grouped[country].forEach(p => {
      const dotClass = p.live_status === 'LIVE' ? 'live' : p.live_status ? 'pending' : 'offline';
      const label = [p.category, p.type].filter(Boolean).join(' · ') || 'Page';
      html += `<a href="${p.link}" target="_blank" class="links-item" data-search="${(country + ' ' + label).toLowerCase()}">
        <span class="li-dot ${dotClass}"></span>
        <span>${label}</span>
        <span class="li-type">${p.live_status || ''}</span>
      </a>`;
    });
    html += `</div>`;
  });
  body.innerHTML = html;
}

function filterPageLinks(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('#linksDrawerBody .links-item').forEach(el => {
    el.style.display = (!q || el.dataset.search.includes(q)) ? '' : 'none';
  });
  document.querySelectorAll('#linksDrawerBody .links-country-group').forEach(group => {
    const visible = group.querySelectorAll('.links-item:not([style*="display: none"])');
    group.style.display = visible.length > 0 ? '' : 'none';
  });
}

// ============================================================
// Chart Helpers
// ============================================================
function createChart(canvasId,type,data,options={}){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  if(charts[canvasId]) charts[canvasId].destroy();

  const cc=getChartColors();
  const defaultOptions={
    responsive:true,maintainAspectRatio:true,
    plugins:{legend:{labels:{color:cc.text,font:{size:11}}}},
    scales:type==='doughnut'||type==='pie'?{}:{
      x:{ticks:{color:cc.text,font:{size:10}},grid:{color:cc.grid}},
      y:{ticks:{color:cc.text,font:{size:10}},grid:{color:cc.grid}}
    }
  };
  charts[canvasId]=new Chart(canvas,{type,data,options:mergeDeep(defaultOptions,options)});
}

function mergeDeep(target,source){
  const output={...target};
  for(const key in source){
    if(source[key]&&typeof source[key]==='object'&&!Array.isArray(source[key])){output[key]=mergeDeep(target[key]||{},source[key]);}
    else{output[key]=source[key];}
  }
  return output;
}

function kpiCard(label,value,change){
  const changeClass=change>0?'up':change<0?'down':'neutral';
  const changeText=change!=null?`${change>0?'+':''}${change.toFixed(1)}% MoM`:'';
  const displayValue=typeof value==='string'?value:formatNum(value);
  return `<div class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value">${displayValue}</div>${changeText?`<div class="kpi-change ${changeClass}">${changeText}</div>`:''}</div>`;
}

function showToast(msg){
  const toast=document.getElementById('toast');
  toast.textContent=msg;toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}
